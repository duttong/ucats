// the adr2000 analogfull command.  First number is board ID,
// the second number is analog in channel number.  Use this command
// to set the channel to +/- 5 volts scale.
adr2000: AnalogFull: 0 1
adr2000: AnalogFull: 0 2
adr2000: AnalogFull: 0 3
adr2000: AnalogFull: 0 4
adr2000: AnalogFull: 0 5
adr2000: AnalogFull: 0 6
adr2000: AnalogFull: 0 7
adr2000: AnalogFull: 0 0


// adr2000 digconfig is used to configure digital channels to be
// digin and digout.  The first number is the board ID the second 
// set of numbers are the channels starting with 7 and counting down
// to 0.  A 1 is used for digin 0 is digout.
adr2000: DIGconfig: 0 00000001
